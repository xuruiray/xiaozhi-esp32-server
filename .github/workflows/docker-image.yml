name: Docker Image CI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Base Image"]
    types:
      - completed

env:
  ALIYUN_REPO: ${{ secrets.ALIYUN_REGISTRY }}/xuruiray/lora

jobs:
  release:
    name: Release Docker images
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write
      issues: write
    steps:
      - name: Check Disk Space
        run: |
          df -h
          docker system df

      - name: Clean up Docker resources
        run: |
          docker system prune -af
          docker builder prune -af

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "$GITHUB_REF" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            echo "IS_VERSION=true" >> "$GITHUB_ENV"
          else
            echo "VERSION=latest" >> "$GITHUB_ENV"
            echo "IS_VERSION=false" >> "$GITHUB_ENV"
          fi

      - name: Build and push xiaozhi-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:server_latest
            ${{ env.ALIYUN_REPO }}:server_latest
            ${{ env.IS_VERSION == 'true' && format('ghcr.io/{0}:server_{1}', github.repository, env.VERSION) || '' }}
            ${{ env.IS_VERSION == 'true' && format('{0}:server_{1}', env.ALIYUN_REPO, env.VERSION) || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: Build and push manager-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:web_latest
            ${{ env.ALIYUN_REPO }}:web_latest
            ${{ env.IS_VERSION == 'true' && format('ghcr.io/{0}:web_{1}', github.repository, env.VERSION) || '' }}
            ${{ env.IS_VERSION == 'true' && format('{0}:web_{1}', env.ALIYUN_REPO, env.VERSION) || '' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_PROGRESS=plain
